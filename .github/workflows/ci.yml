# Phase 4 — CI Pipeline (Module 10)
#
# Runs on every push/PR to main: installs dependencies, lints, and builds
# both the backend and frontend, plus sanity-checks the ML service.
# This is CI only — it does NOT deploy anywhere. Deployment is manual /
# handled by Render, Railway, and Vercel's own git integrations (see
# docs/DEPLOYMENT.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Install & Boot Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Verify app boots (no missing modules / syntax errors)
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/agrow-ai-ci
          JWT_SECRET: ci_test_secret_do_not_use_in_prod
          JWT_EXPIRE: 7d
        run: node -e "require('./src/app'); console.log('Backend app loads cleanly.')"

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/api
        run: npm run build

  ml-service:
    name: ML Service — Install & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ml
        run: pip install -r requirements.txt

      - name: Verify service imports cleanly
        working-directory: ml
        run: python -c "import app; print('ML service module imports cleanly.')"
