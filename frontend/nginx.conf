server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router client-side routing: any unknown path falls back to
    # index.html instead of nginx returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed build assets; index.html itself is
    # intentionally not cached so deploys are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
